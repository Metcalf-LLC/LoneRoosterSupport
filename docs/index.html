<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoneRooster Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      color: #333;
      background: #faf9f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      text-align: center;
      background: #fff;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #8b4513; margin-bottom: 10px; font-size: 2em; }
    .tagline { color: #666; margin-bottom: 40px; }
    .links { display: flex; flex-direction: column; gap: 15px; }
    a {
      display: block;
      padding: 15px 30px;
      background: #8b4513;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #6d350f; }
    .footer { margin-top: 40px; color: #999; font-size: 0.85em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LoneRooster</h1>
    <p class="tagline">Business management for contractors</p>
    <div class="links">
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="account-deletion/">Delete Account</a>
    </div>
    <p class="footer">&copy; 2026 Metcalf LLC</p>
  </div>
</body>
</html>
